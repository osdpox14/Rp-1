name: Build and Tunnel

on:
  push:
    branches:
      - main
  schedule:
    # Auto-restart every 5 hours 30 minutes
    - cron: '0 0,11,22 * * *'
    - cron: '30 5,16 * * *'
  workflow_dispatch:
    inputs:
      HOLD_MINUTES:
        description: "How long to keep the session alive (minutes)"
        required: false
        default: "330"
      BOT_ZIP_URL:
        description: "Direct link to your Bot.zip (Downloads\\Bot target)"
        required: false
        default: ""
      RDP_PASSWORD:
        description: "Password for runneradmin if not provided via secret"
        required: false
        default: ""
      BORE_PORT:
        description: "Optional bore tunnel port (leave blank for random)"
        required: false
        default: ""
      BORE_SERVER:
        description: "bore server address (default: bore.pub)"
        required: false
        default: ""

concurrency:
  group: rdp-session
  cancel-in-progress: true

jobs:
  build-job:
    runs-on: windows-latest

    env:
      RDP_PASSWORD_SECRET: ${{ secrets.RDP_PASSWORD }}
      BOT_ZIP_URL_SECRET: ${{ secrets.BOT_ZIP_URL }}

      HOLD_MINUTES_INPUT: ${{ github.event.inputs.HOLD_MINUTES }}
      BOT_ZIP_URL_INPUT: ${{ github.event.inputs.BOT_ZIP_URL }}
      RDP_PASSWORD_INPUT: ${{ github.event.inputs.RDP_PASSWORD }}

      BOT_ZIP_URL_DEFAULT: "https://www.dropbox.com/scl/fi/erwxdluni221878ct83mm/BOT.zip?rlkey=2rylpxvx0oy8txsgf3nrssgqp&st=rx9cd5mh&dl=1"

      BORE_PORT_INPUT: ${{ github.event.inputs.BORE_PORT }}
      BORE_SERVER_INPUT: ${{ github.event.inputs.BORE_SERVER }}

    steps:
      - name: Show runner info
        shell: pwsh
        run: |
          Write-Host "Runner name        : $env:RUNNER_NAME"
          Write-Host "Runner OS          : $env:RUNNER_OS"
          Write-Host "Workspace          : $env:GITHUB_WORKSPACE"
          Write-Host "Trigger event      : $env:GITHUB_EVENT_NAME"

      - name: Resolve all inputs/defaults
        id: resolve
        shell: pwsh
        run: |
          # --- Hold minutes ---
          $hold = $env:HOLD_MINUTES_INPUT
          if ([string]::IsNullOrWhiteSpace($hold)) { $hold = "330" }
          if (-not ($hold -as [int])) { $hold = "330" }

          # --- RDP password: secret > input > default ---
          $rdp = $env:RDP_PASSWORD_SECRET
          if ([string]::IsNullOrWhiteSpace($rdp)) { $rdp = $env:RDP_PASSWORD_INPUT }
          if ([string]::IsNullOrWhiteSpace($rdp)) { $rdp = "P@ssw0rd!" }

          # --- Bot URL: secret > input > hard default ---
          $botUrl = $env:BOT_ZIP_URL_SECRET
          if ([string]::IsNullOrWhiteSpace($botUrl)) { $botUrl = $env:BOT_ZIP_URL_INPUT }
          if ([string]::IsNullOrWhiteSpace($botUrl)) { $botUrl = $env:BOT_ZIP_URL_DEFAULT }

          # --- Bore server and port ---
          $boreServer = $env:BORE_SERVER_INPUT
          if ([string]::IsNullOrWhiteSpace($boreServer)) { $boreServer = "bore.pub" }

          $borePort = $env:BORE_PORT_INPUT
          if ([string]::IsNullOrWhiteSpace($borePort)) { $borePort = "0" }

          Write-Host "Effective Hold (min): $hold"
          Write-Host "Effective Bot URL   : $botUrl"
          Write-Host "Bore server         : $boreServer"
          Write-Host "Bore port           : $borePort"

          "EffectiveHoldMinutes=$hold"        | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "EffectiveRdpPassword=$rdp"         | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "EffectiveBotUrl=$botUrl"           | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "EffectiveBoreServer=$boreServer"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "EffectiveBorePort=$borePort"       | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Download bore
        shell: pwsh
        run: |
          $url = "https://github.com/ekzhang/bore/releases/download/v0.6.0/bore-v0.6.0-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest $url -OutFile bore.zip
          Expand-Archive bore.zip -DestinationPath . -Force
          if (-not (Test-Path ".\bore.exe")) { throw "bore.exe not found after extract" }
          Write-Host "bore downloaded and extracted."

      - name: Enable Remote Desktop
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          Write-Host "RDP enabled and firewall updated."

      - name: Set runneradmin password
        shell: pwsh
        run: |
          $pwd = '${{ steps.resolve.outputs.EffectiveRdpPassword }}'
          Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText $pwd -Force)
          Write-Host "runneradmin password set."

      - name: Ensure Chrome is present (check only)
        shell: pwsh
        run: |
          $chrome = "C:\Program Files\Google\Chrome\Application\chrome.exe"
          if (-not (Test-Path $chrome)) { $chrome = "C:\Program Files (x86)\Google\Chrome\Application\chrome.exe" }
          if (-not (Test-Path $chrome)) {
            throw "Chrome not found. Please switch back to the installer step or ensure Chrome exists at standard paths."
          }
          Write-Host "Chrome found at: $chrome"

      - name: Create Chrome Default profile and suppress first-run
        shell: pwsh
        run: |
          $chrome = "C:\Program Files\Google\Chrome\Application\chrome.exe"
          if (-not (Test-Path $chrome)) { $chrome = "C:\Program Files (x86)\Google\Chrome\Application\chrome.exe" }

          New-Item -Path "HKLM:\SOFTWARE\Policies\Google\Chrome" -Force | Out-Null
          New-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Google\Chrome" -Name "SuppressFirstRunDefaultBrowserPrompt" -PropertyType DWord -Value 1 -Force | Out-Null
          New-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Google\Chrome" -Name "DefaultBrowserSettingEnabled" -PropertyType DWord -Value 0 -Force | Out-Null
          New-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Google\Chrome" -Name "BrowserSignin" -PropertyType DWord -Value 0 -Force | Out-Null

          $userData = Join-Path $env:LOCALAPPDATA "Google\Chrome\User Data"
          $defaultProfile = Join-Path $userData "Default"
          New-Item -ItemType Directory -Force -Path $defaultProfile | Out-Null

          $prefsPath = Join-Path $defaultProfile "Preferences"
          if (-not (Test-Path $prefsPath)) {
            $prefs = @{
              "browser" = @{ "has_seen_welcome_page" = true }
              "first_run_tabs" = @()
              "distribution" = @{ "skip_first_run_ui" = true }
              "profile" = @{ "exit_type" = "Normal"; "name" = "Default" }
            } | ConvertTo-Json -Depth 5
            $prefs | Out-File -FilePath $prefsPath -Encoding utf8 -Force
          }

          $localStatePath = Join-Path $userData "Local State"
          if (-not (Test-Path $localStatePath)) {
            $localState = @{
              "browser" = @{ "enabled_labs_experiments" = @() }
              "profile" = @{ "last_used" = "Default" }
            } | ConvertTo-Json -Depth 5
            $localState | Out-File -FilePath $localStatePath -Encoding utf8 -Force
          }

          $args = @(
            "--headless=new", "--disable-gpu", "--no-first-run",
            "--no-default-browser-check",
            "--user-data-dir=""$userData""",
            "--profile-directory=""Default"""
          ) -join " "

          Write-Host "Priming Chrome profile at: $defaultProfile"
          Start-Process -FilePath $chrome -ArgumentList $args
          Start-Sleep -Seconds 6
          Get-Process chrome -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue

      - name: Install OBS Studio
        shell: pwsh
        run: |
          Write-Host "Installing OBS Studio via winget..."
          winget install -e --id OBSProject.OBSStudio --disable-interactivity --accept-source-agreements --accept-package-agreements
          Write-Host "OBS Studio installed."

      - name: Prepare Bot base directory
        shell: pwsh
        run: |
          $downloads = "C:\Users\runneradmin\Downloads"
          $BOT_BASE = Join-Path $downloads "Bot"
          New-Item -ItemType Directory -Force -Path $downloads | Out-Null
          New-Item -ItemType Directory -Force -Path $BOT_BASE | Out-Null
          Write-Host "Created $BOT_BASE"

      - name: Download and extract Bot to C:\Users\runneradmin\Downloads\Bot
        shell: pwsh
        env:
          EFFECTIVE_BOT_URL: ${{ steps.resolve.outputs.EffectiveBotUrl }}
        run: |
          $ErrorActionPreference = 'Stop'
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          $downloads = "C:\Users\runneradmin\Downloads"
          $BOT_BASE = Join-Path $downloads "Bot"
          $tmp = Join-Path $env:TEMP ('botdl_' + [guid]::NewGuid())
          New-Item -ItemType Directory -Force -Path $tmp | Out-Null

          function Invoke-WithRetry([string]$url, [string]$outFile, [int]$retries = 3, [int]$delay = 5) {
            for ($i = 1; $i -le $retries; $i++) {
              try {
                Write-Host ("Downloading (attempt {0}/{1}) from {2}" -f $i, $retries, $url)
                Invoke-WebRequest -Uri $url -OutFile $outFile -UseBasicParsing -TimeoutSec 120
                return
              } catch {
                Write-Host ("Download failed: {0}" -f $_.Exception.Message)
                if ($i -lt $retries) { Start-Sleep -Seconds $delay }
              }
            }
            throw "Failed to download after $retries attempts: $url"
          }

          try {
            $zipPath = Join-Path $tmp 'bot.zip'
            if ([string]::IsNullOrWhiteSpace($env:EFFECTIVE_BOT_URL)) {
              throw "Effective bot URL is empty. Provide BOT_ZIP_URL input or secret."
            }
            Invoke-WithRetry -url $env:EFFECTIVE_BOT_URL -outFile $zipPath

            $extract = Join-Path $tmp 'unzipped'
            Expand-Archive -Path $zipPath -DestinationPath $extract -Force

            $candidates = @(
              (Join-Path $extract 'Bot'),
              (Join-Path $extract 'bot')
            ) | Where-Object { Test-Path $_ }

            if ($candidates.Count -gt 0) {
              $root = $candidates[0]
              Write-Host ("Found root folder in archive: {0}" -f $root)
              Copy-Item -Path (Join-Path $root '*') -Destination $BOT_BASE -Recurse -Force
            } else {
              Write-Host "No root 'Bot' folder; copying all extracted files into BOT_BASE"
              Copy-Item -Path (Join-Path $extract '*') -Destination $BOT_BASE -Recurse -Force
            }
          }
          finally {
            try { Remove-Item -LiteralPath $tmp -Recurse -Force -ErrorAction SilentlyContinue } catch {}
          }

      - name: Launch bots (start-bots.bat) in background
        shell: pwsh
        run: |
          $BOT_BASE = "C:\Users\runneradmin\Downloads\Bot"
          $bat = Join-Path $BOT_BASE 'start-bots.bat'
          if (-not (Test-Path $bat)) { throw "start-bots.bat not found at $bat" }
          Write-Host "Launching bots via start-bots.bat in background ..."
          $psi = New-Object System.Diagnostics.ProcessStartInfo
          $psi.FileName = $bat
          $psi.WorkingDirectory = $BOT_BASE
          $psi.UseShellExecute = $true
          $psi.WindowStyle = 'Normal'
          [void][System.Diagnostics.Process]::Start($psi)

      - name: Run bore TCP tunnel and notify via Telegram
        shell: pwsh
        env:
          HOLD_MINUTES: ${{ steps.resolve.outputs.EffectiveHoldMinutes }}
          BORE_SERVER: ${{ steps.resolve.outputs.EffectiveBoreServer }}
          BORE_PORT: ${{ steps.resolve.outputs.EffectiveBorePort }}
          TG_BOT_TOKEN: "8679941554:AAFGV_evd6AehtijxPA57Uh4ZBdOyJpJLCg"
          TG_CHAT_ID: "1670086536"
        run: |
          $bore = Join-Path $PWD "bore.exe"
          if (-not (Test-Path $bore)) { throw "bore.exe not found" }

          $minutes = 330
          if ($env:HOLD_MINUTES -and ($env:HOLD_MINUTES -as [int]) -gt 0) { $minutes = [int]$env:HOLD_MINUTES }
          $deadline = (Get-Date).AddMinutes($minutes)

          $server = $env:BORE_SERVER
          if ([string]::IsNullOrWhiteSpace($server)) { $server = "bore.pub" }

          $port = $env:BORE_PORT
          if ([string]::IsNullOrWhiteSpace($port) -or $port -eq "0" -or $port -eq 0) { $port = $null }

          $tgToken = $env:TG_BOT_TOKEN
          $tgChatId = $env:TG_CHAT_ID
          if ([string]::IsNullOrWhiteSpace($tgToken) -or [string]::IsNullOrWhiteSpace($tgChatId)) {
            Write-Host "Telegram notification disabled"
            $tgToken = $null
          }

          $msgSent = $false

          while ((Get-Date) -lt $deadline) {
            $startTime = Get-Date
            Write-Host ("[{0}] bore starting ..." -f $startTime.ToString("HH:mm:ss"))

            $psi = New-Object System.Diagnostics.ProcessStartInfo
            $psi.FileName = $bore
            $psi.Arguments = "local 3389 --to $server"
            if ($port) { $psi.Arguments += " --port $port" }
            $psi.RedirectStandardOutput = $true
            $psi.RedirectStandardError = $true
            $psi.UseShellExecute = $false
            $psi.CreateNoWindow = $true

            try {
              $proc = New-Object System.Diagnostics.Process
              $proc.StartInfo = $psi
              if (-not $proc.Start()) { throw "Failed to start bore process" }
              Write-Host "bore PID: $($proc.Id)"

              $address = $null
              $found = $false
              $timeout = (Get-Date).AddSeconds(30)

              while ((Get-Date) -lt $timeout -and (Get-Date) -lt $deadline -and -not $found) {
                $line = $proc.StandardOutput.ReadLine()
                if ($line -ne $null) {
                  Write-Host "bore: $line"
                  if ($line -match '(?:on|at)\s+(\S+)') {
                    $address = $matches[1]
                    $found = $true
                  }
                } elseif ($proc.HasExited) {
                  break
                } else {
                  Start-Sleep -Milliseconds 200
                }
              }

              # Also read buffered stdout
              if (-not $found) {
                $rest = $proc.StandardOutput.ReadToEnd()
                if ($rest) {
                  Write-Host "bore extra: $rest"
                  if ($rest -match '(?:on|at)\s+(\S+)') {
                    $address = $matches[1]
                    $found = $true
                  }
                }
              }

              # Check stderr if still not found
              if (-not $found) {
                $err = $proc.StandardError.ReadToEnd()
                if ($err) {
                  Write-Host "bore stderr: $err"
                  if ($err -match '(?:on|at)\s+(\S+)') {
                    $address = $matches[1]
                    $found = $true
                  }
                }
              }

              if ($found) {
                Write-Host "Tunnel address: $address"
                "## Bore Tunnel Address" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
                "The RDP tunnel is ready! Connect to: **$address**" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
                if ($tgToken -and -not $msgSent) {
                  try {
                    $body = @{ chat_id = "$tgChatId"; text = "RDP tunnel ready! Connect to: $address" } | ConvertTo-Json
                    Invoke-RestMethod -Uri "https://api.telegram.org/bot${tgToken}/sendMessage" -Method Post -Body $body -ContentType "application/json" -ErrorAction Stop | Out-Null
                    $msgSent = $true
                    Write-Host "Telegram notification sent"
                  } catch {
                    Write-Host "Telegram send failed: $_"
                  }
                }
              } else {
                Write-Host "bore address not found in output after 30s"
              }

              # Wait for bore to exit or deadline
              while ((Get-Date) -lt $deadline -and -not $proc.HasExited) {
                Start-Sleep -Seconds 5
              }
              if (-not $proc.HasExited) { $proc.Kill() }
            }
            catch {
              Write-Host ("bore error: {0}" -f $_.Exception.Message)
            }
            finally {
              if ($proc -and -not $proc.HasExited) { $proc.Kill() }
              if ($proc) { $proc.Dispose() }
              Get-Process -Name "bore" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            }

            $endTime = Get-Date
            if ((Get-Date) -lt $deadline) {
              $dur = [int]($endTime - $startTime).TotalSeconds
              Write-Host ("[{0}] bore exited after {1}s. Restarting in 2s..." -f $endTime.ToString("HH:mm:ss"), $dur)
              Start-Sleep -Seconds 2
            }
          }
          Write-Host "Bore tunnel window elapsed."

      - name: Final status
        if: always()
        shell: pwsh
        run: |
          Write-Host ("Workflow finished. Held for {0} minutes." -f '${{ steps.resolve.outputs.EffectiveHoldMinutes }}')
          Write-Host "Next scheduled auto-restart: in ~5.5 hours (cron: 0 0,11,22 * * * / 30 5,16 * * *)"
